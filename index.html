<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Omarchy Themes</title>
<meta name="description" content="2,500+ Omarchy theme variants generated from curated wallpapers. One-click apply with Aether.">

<!-- Favicons (sourced from omarchy.org). The PNG ships at 300x300 so
     it works as both a tab icon and the home-screen icon. -->
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<!-- Open Graph + Twitter card so links unfurl cleanly on Slack, Discord,
     iMessage, X, etc. The og:image is the same Omarchy logo used as the
     favicon - small but recognizable. -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Omarchy Themes">
<meta property="og:title" content="Omarchy Themes -- apply with Aether">
<meta property="og:description" content="2,500+ Omarchy theme variants generated from curated wallpapers. One-click apply with Aether.">
<meta property="og:url" content="https://bjarneo.github.io/omarchy-themes/">
<meta property="og:image" content="https://bjarneo.github.io/omarchy-themes/favicon.png">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Omarchy Themes -- apply with Aether">
<meta name="twitter:description" content="2,500+ Omarchy theme variants generated from curated wallpapers. One-click apply with Aether.">
<meta name="twitter:image" content="https://bjarneo.github.io/omarchy-themes/favicon.png">
<style>
  /* Cascadia Code is what omarchy.org uses for everything; self-hosting
     it from this repo keeps the look consistent on every platform. */
  @font-face { font-display: swap; font-family: 'Cascadia Code'; font-style: normal; font-weight: 300; src: url('fonts/CascadiaCode-SemiLight.woff2') format('woff2'); }
  @font-face { font-display: swap; font-family: 'Cascadia Code'; font-style: normal; font-weight: 400; src: url('fonts/CascadiaCode-Regular.woff2') format('woff2'); }
  @font-face { font-display: swap; font-family: 'Cascadia Code'; font-style: normal; font-weight: 600; src: url('fonts/CascadiaCode-SemiBold.woff2') format('woff2'); }
  @font-face { font-display: swap; font-family: 'Cascadia Code'; font-style: normal; font-weight: 700; src: url('fonts/CascadiaCode-Bold.woff2') format('woff2'); }

  :root {
    /* Tokyo Night palette - same source variables omarchy.org uses, so
       the two sites share an identity. */
    --bg: #1a1b26;        /* tokyo-night "night" background */
    --bg-elev: #24283b;   /* "storm" background, used for cards */
    --bg-elev-2: #2a2e44; /* one step elevated for chips / pills / panels */
    --border: #414868;    /* terminal-black, subtle dividers */
    --text: #c0caf5;      /* terminal-white */
    --text-dim: #9aa5ce;
    --text-faint: #565f89;
    --accent: #7aa2f7;    /* terminal-blue, Omarchy's primary accent */
    --accent-soft: #7aa2f733;
    --green: #9ece6a;
    --turquoise: #b4f9f8;
    --radius: 0px;
    --radius-sm: 0px;
    /* Monospace-first font stack. Cascadia Code (self-hosted) primary,
       then a sequence of OS / browser monospace fallbacks. */
    --font: 'Cascadia Code', ui-monospace, 'JetBrains Mono', 'Fira Code', Menlo, Consolas, monospace;
    --mono: 'Cascadia Code', ui-monospace, 'JetBrains Mono', 'Fira Code', Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: light) {
    /* Tokyo Night Day - the light counterpart Omarchy users recognise.
       Same accent hue, inverted neutrals. */
    :root {
      --bg: #e1e2e7;
      --bg-elev: #cdced3;
      --bg-elev-2: #c0c2c8;
      --border: #a8aece;
      --text: #3760bf;
      --text-dim: #5a6491;
      --text-faint: #848cb5;
      --accent: #2e7de9;
      --accent-soft: #2e7de933;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--font); }
  body { min-height: 100vh; }
  a { color: inherit; }

  header {
    position: sticky; top: 0; z-index: 50;
    background: color-mix(in oklab, var(--bg) 88%, transparent);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .head-row {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 18px;
    max-width: 1600px; margin: 0 auto;
  }
  .brand { font-weight: 700; letter-spacing: -0.01em; font-size: 15px; display: flex; align-items: center; gap: 8px; }
  .brand .brand-logo { width: 22px; height: 22px; display: block; flex-shrink: 0; }
  .brand .count { color: var(--text-faint); font-weight: 500; font-size: 12px; font-family: var(--mono); }
  .search { flex: 1; max-width: 520px; position: relative; }
  .search input {
    width: 100%;
    background: var(--bg-elev); color: var(--text);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 9px 12px 9px 34px;
    font-size: 13px; font-family: var(--font); outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .search svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-faint); }
  .head-meta { color: var(--text-dim); font-size: 12px; font-family: var(--mono); margin-left: auto; }
  .head-meta button {
    background: none; border: 1px solid var(--border); color: var(--text-dim);
    border-radius: var(--radius-sm); padding: 6px 10px;
    font-family: var(--mono); font-size: 11px; cursor: pointer;
  }
  .head-meta button:hover { color: var(--text); border-color: var(--text-faint); }

  .filters { max-width: 1600px; margin: 0 auto; padding: 0 18px 12px; }
  .frow { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
  .flabel { font-size: 10px; font-family: var(--mono); color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.1em; width: 50px; flex-shrink: 0; }
  .sep { width: 1px; height: 18px; background: var(--border); margin: 0 6px; }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px;
    background: var(--bg-elev); border: 1px solid var(--border); border-radius: 0;
    color: var(--text-dim); font-size: 12px; font-family: var(--mono);
    cursor: pointer; user-select: none;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  .chip:hover { color: var(--text); border-color: var(--text-faint); }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .chip.zero { opacity: 0.4; }
  .chip .dot { width: 8px; height: 8px; border-radius: 50%; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18); }
  .chip .num { font-size: 10px; color: var(--text-faint); margin-left: 2px; }
  .chip.active .num { color: rgba(255,255,255,0.75); }

  .dd { position: relative; }
  .dd-btn { display: inline-flex; align-items: center; gap: 6px; padding: 4px 8px 4px 10px;
    background: var(--bg-elev); border: 1px solid var(--border); border-radius: 0;
    color: var(--text-dim); font-size: 12px; font-family: var(--mono); cursor: pointer; }
  .dd-btn:hover { color: var(--text); border-color: var(--text-faint); }
  .dd-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .dd-btn .dd-label { text-transform: uppercase; font-size: 10px; letter-spacing: 0.08em; opacity: 0.8; }
  .dd-btn .dd-val { font-weight: 600; }
  .dd-btn .dd-clear { opacity: 0.6; padding: 0 2px; }
  .dd-btn .dd-clear:hover { opacity: 1; }
  .dd-btn:not(.active) .dd-clear { display: none; }
  .dd-btn .dd-caret { font-size: 9px; opacity: 0.6; }
  .dd-menu {
    position: absolute; top: calc(100% + 6px); left: 0;
    min-width: 220px; max-height: 320px;
    background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius);
    z-index: 60; display: none; flex-direction: column; overflow: hidden;
    box-shadow: 0 12px 28px rgba(0,0,0,0.4);
  }
  .dd-menu.open { display: flex; }
  .dd-search {
    width: 100%; padding: 9px 12px;
    background: transparent; color: var(--text);
    border: none; border-bottom: 1px solid var(--border);
    font-family: var(--font); font-size: 12px; outline: none;
  }
  .dd-list { overflow-y: auto; max-height: 270px; padding: 4px; }
  .dd-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 10px; border-radius: var(--radius-sm);
    font-size: 12px; cursor: pointer; color: var(--text-dim); font-family: var(--mono);
  }
  .dd-item:hover { background: var(--bg-elev-2); color: var(--text); }
  .dd-item.selected { background: var(--accent-soft); color: var(--text); }
  .dd-item-count { font-size: 10px; color: var(--text-faint); }
  .dd-item.zero { opacity: 0.4; }

  /* Resolution range item: a row with the tier name, count, and two
     small operator chips ('>=' and '<=') for setting the min / max
     bound from a single list. */
  .dd-range {
    display: grid; grid-template-columns: 1fr auto auto auto; gap: 8px;
    align-items: center;
    padding: 5px 8px;
    color: var(--text-dim); font-family: var(--mono); font-size: 12px;
    cursor: default;
  }
  .dd-range:hover { background: var(--bg-elev-2); color: var(--text); }
  .dd-range .name { white-space: nowrap; }
  .dd-range .count { font-size: 10px; color: var(--text-faint); min-width: 32px; text-align: right; }
  .dd-range.zero .name, .dd-range.zero .count { opacity: 0.4; }
  .op-btn {
    background: var(--bg-elev-2); color: var(--text-faint);
    border: 1px solid var(--border);
    padding: 2px 7px;
    font-family: var(--mono); font-size: 11px;
    cursor: pointer;
    transition: color 0.12s, background 0.12s, border-color 0.12s;
  }
  .op-btn:hover { color: var(--text); border-color: var(--text-faint); }
  .op-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .chip-dot-inline { width: 10px; height: 10px; border-radius: 50%; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18); flex-shrink: 0; }

  main { max-width: 1600px; margin: 0 auto; padding: 18px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }
  .card {
    position: relative;
    background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; cursor: pointer;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    display: flex; flex-direction: column;
  }
  .card:hover { transform: translateY(-2px); border-color: var(--text-faint); box-shadow: 0 8px 24px rgba(0,0,0,0.25); }
  .card-image { position: relative; aspect-ratio: 16 / 10; overflow: hidden; }
  .card-image img {
    width: 100%; height: 100%; object-fit: cover; display: block;
    opacity: 0; transition: opacity 0.3s;
  }
  .card-image img.loaded { opacity: 1; }
  .card .badge {
    position: absolute; top: 8px; left: 8px;
    background: rgba(0,0,0,0.55); color: #fff;
    padding: 3px 7px; border-radius: var(--radius-sm);
    font-size: 10px; font-family: var(--mono);
    backdrop-filter: blur(4px);
  }
  .card-body { padding: 10px 12px 12px; }
  .card-title {
    font-weight: 600; font-size: 13px; line-height: 1.3;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .card-sub { margin-top: 2px; font-family: var(--mono); font-size: 10px; color: var(--text-faint); }
  /* Three stacked 16-color strips - one per variant - give a glanceable
     preview of what each apply option looks like before opening the lightbox. */
  .ramps {
    display: flex; flex-direction: column; gap: 2px;
    margin-top: 10px;
    border-radius: var(--radius-sm); overflow: hidden;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
  }
  .ramp {
    display: grid; grid-template-columns: repeat(16, 1fr);
    height: 9px;
  }
  .ramp .sl { height: 100%; }

  .empty {
    grid-column: 1 / -1; padding: 80px 20px;
    text-align: center; color: var(--text-dim);
    font-family: var(--mono); font-size: 13px; line-height: 1.6;
  }
  .sentinel { grid-column: 1 / -1; height: 1px; }

  .lb { position: fixed; inset: 0; background: rgba(8, 9, 12, 0.92); z-index: 100; display: none; align-items: stretch; }
  .lb.open { display: flex; }
  .lb-image-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 24px; min-width: 0;
  }
  .lb-image-wrap img {
    max-width: 100%; max-height: 100%; object-fit: contain;
    border-radius: var(--radius); box-shadow: 0 20px 60px rgba(0,0,0,0.5); background: #000;
  }
  .lb-side {
    width: 380px;
    background: var(--bg-elev); border-left: 1px solid var(--border);
    padding: 18px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 12px;
  }
  .lb-variants { display: flex; flex-direction: column; gap: 6px; }
  .lb-close {
    position: absolute; top: 14px; right: 14px;
    width: 32px; height: 32px; border-radius: 999px;
    background: rgba(0,0,0,0.4); color: #fff; border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 18px; z-index: 1;
  }
  .lb-close:hover { background: rgba(0,0,0,0.7); }
  .lb-title { font-size: 18px; font-weight: 700; line-height: 1.25; word-break: break-word; }
  .lb-path {
    font-family: var(--mono); font-size: 11px; color: var(--text-faint);
    word-break: break-all;
    padding: 8px 10px;
    background: var(--bg-elev-2); border-radius: var(--radius-sm); border: 1px solid var(--border);
  }
  .lb-sec-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); font-family: var(--mono); }
  .kv { display: grid; grid-template-columns: 80px 1fr; gap: 6px 12px; font-size: 12px; margin: 0; }
  .kv dt { color: var(--text-faint); font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; padding-top: 2px; }
  .kv dd { margin: 0; color: var(--text); word-break: break-word; }
  .tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag {
    font-size: 11px; padding: 3px 8px;
    background: var(--bg-elev-2); border: 1px solid var(--border); border-radius: 0;
    color: var(--text-dim); font-family: var(--mono);
  }

  /* Variant card inside the lightbox: one per apply option
     (Deep / Warm / Cool / Material). Tight layout so all four fit without
     much scrolling: name + Apply share the header row, ramp underneath,
     secondary file links as small text. */
  .variant {
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    overflow: hidden;
    background: var(--bg-elev-2);
  }
  .variant-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 8px 6px 10px; gap: 8px;
  }
  .variant-name { font-weight: 600; font-size: 12px; letter-spacing: -0.01em; }
  .variant-apply {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px;
    background: var(--accent); color: #fff;
    border: 1px solid var(--accent); border-radius: 0;
    font-family: var(--font); font-size: 11px; font-weight: 600;
    cursor: pointer; text-decoration: none;
    flex-shrink: 0;
    transition: filter 0.15s, background 0.15s;
    min-width: 64px; justify-content: center;
  }
  .variant-apply:hover { filter: brightness(1.1); }
  .variant-apply.applying { background: color-mix(in oklab, var(--accent) 70%, #000); }
  .variant-apply.sent { background: #2c8b56; border-color: #2c8b56; }
  .variant-apply .spin {
    width: 10px; height: 10px;
    border: 1.5px solid rgba(255,255,255,0.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: lspin 0.7s linear infinite;
  }

  /* Bottom-right toast confirming the protocol handler fired. The
     browser can't tell us whether Aether actually received the URL, so
     this is an acknowledgement of the click, not a guarantee. */
  .toast {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--bg-elev); color: var(--text);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 10px 14px;
    box-shadow: 0 12px 28px rgba(0,0,0,0.45);
    font-family: var(--font); font-size: 12px;
    display: flex; align-items: center; gap: 10px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.18s, transform 0.18s;
    z-index: 300;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 4px color-mix(in oklab, var(--accent) 30%, transparent);
  }
  .toast .dot.ok { background: #2c8b56; box-shadow: 0 0 0 4px color-mix(in oklab, #2c8b56 30%, transparent); }
  .toast strong { font-weight: 600; }
  .toast .muted { color: var(--text-faint); font-family: var(--mono); font-size: 11px; }
  .variant .ramp { height: 10px; }
  .variant-foot {
    display: flex; gap: 8px; align-items: center;
    padding: 4px 10px 6px;
    font-family: var(--mono); font-size: 10px;
    color: var(--text-faint);
  }
  .variant-foot a {
    color: var(--text-faint); text-decoration: none;
    padding: 2px 4px; border-radius: 0;
  }
  .variant-foot a:hover { color: var(--text); background: var(--bg-elev); }
  .variant-foot .slug { margin-left: auto; opacity: 0.7; }

  .btn {
    flex: 1; min-width: 0;
    padding: 9px 12px;
    background: var(--bg-elev-2); border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius-sm);
    font-family: var(--font); font-size: 12px; cursor: pointer;
    text-align: center; text-decoration: none;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--text-faint); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { filter: brightness(1.08); }

  @media (max-width: 760px) {
    .lb { flex-direction: column; }
    .lb-side { width: auto; max-height: 60vh; border-left: none; border-top: 1px solid var(--border); }
    .flabel { width: 44px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
    .head-meta { display: none; }
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 0; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }

  .loader {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px;
    background: var(--bg); z-index: 200;
    transition: opacity 0.3s ease, visibility 0.3s ease;
  }
  .loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  .loader-spinner {
    width: 28px; height: 28px;
    border: 2.5px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: lspin 0.8s linear infinite;
  }
  .loader-text { font-family: var(--mono); font-size: 11px; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; }
  @keyframes lspin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading" class="loader">
  <div class="loader-spinner"></div>
  <div class="loader-text">loading themes</div>
</div>

<header>
  <div class="head-row">
    <div class="brand">
      <img src="favicon.png" alt="" class="brand-logo">
      <span>Omarchy Themes</span>
      <span class="count" id="count">loading...</span>
    </div>
    <div class="search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input id="q" type="search" placeholder="Search title, tags, path...">
    </div>
    <div class="head-meta">
      <button id="reset">reset</button>
    </div>
  </div>
  <div class="filters" id="filters"></div>
</header>

<main>
  <div class="grid" id="grid"></div>
</main>

<div class="lb" id="lb" role="dialog" aria-modal="true">
  <button class="lb-close" id="lbclose" title="Close (esc)">&times;</button>
  <div class="lb-image-wrap"></div>
  <aside class="lb-side" id="lbside"></aside>
</div>

<!-- Click-acknowledgement toast. Shown when an Apply link fires. We
     can't observe whether the aether:// handler actually accepted the
     URL, so the toast is an acknowledgement of the click, not a
     guarantee that Aether did anything. -->
<div class="toast" id="toast" role="status" aria-live="polite">
  <span class="dot" id="toast-dot"></span>
  <span><strong id="toast-title">Applying...</strong> <span class="muted" id="toast-detail"></span></span>
</div>

<script src="wallpapers.js"></script>
<script>
const COLOR_DOTS = {
  red:'#e74c5b', orange:'#f5994f', yellow:'#f0d869', green:'#7bbf6f',
  cyan:'#5ec3d0', blue:'#6d8fee', purple:'#a87cd9', pink:'#e88abf',
  monochrome:'#9aa0ab',
};
const TONE_DOTS = { dark: '#1b1e25', light: '#e7e9ee' };
const COLOR_ORDER = ['monochrome','red','orange','yellow','green','cyan','blue','purple','pink'];
const RES_TIERS = ['<=720p','720p','1080p','1440p','4K','5K','8K+'];

// The reference scheme keys in the manifest map to user-facing variant
// labels. The mapping intentionally hides the source-scheme identity --
// each variant's actual palette is wallpaper-derived. "deep" = darkest bg
// + most vivid; "warm" = warm-biased accent; "cool" = muted + cool-biased.
const VARIANT_ORDER = ['tokyo-night', 'gruvbox', 'nord', 'material', 'aether'];
const VARIANT_LABEL = {
  'tokyo-night': 'Deep',
  'gruvbox':     'Warm',
  'nord':        'Cool',
  'material':    'Material',
  'aether':      'Aether',
};

// ANSI slots in their canonical 0..15 order.
const ANSI_KEYS = [
  'color0','color1','color2','color3','color4','color5','color6','color7',
  'color8','color9','color10','color11','color12','color13','color14','color15',
];

const STATE = {
  entries: [],
  byPath: {},
  filtered: [],
  // res_min / res_max are tier names from RES_TIERS. Either can be set
  // alone (open-ended bound) or together (range).
  filters: { tone: null, color: null, res_min: null, res_max: null, q: '' },
  facetCounts: {},
  rendered: 0,
  pageSize: 80,
};

const FILTER_KEYS = ['tone','color','res_min','res_max'];

function readUrl() {
  const sp = new URLSearchParams(location.search);
  for (const k of FILTER_KEYS) STATE.filters[k] = sp.get(k) || null;
  STATE.filters.q = sp.get('q') || '';
}
function buildUrl({ withHash = true } = {}) {
  const sp = new URLSearchParams();
  for (const k of FILTER_KEYS) if (STATE.filters[k]) sp.set(k, STATE.filters[k]);
  if (STATE.filters.q) sp.set('q', STATE.filters.q);
  const qs = sp.toString();
  const hash = withHash ? location.hash : '';
  return location.pathname + (qs ? '?' + qs : '') + hash;
}
function writeUrl() { history.replaceState(null, '', buildUrl()); }
function encodePath(p) { return p.split('/').map(encodeURIComponent).join('/'); }
function decodeHashPath() {
  if (!location.hash) return null;
  try { return decodeURIComponent(location.hash.slice(1)); } catch { return null; }
}

const $ = (s) => document.querySelector(s);
const grid = $('#grid');
const filtersEl = $('#filters');

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text != null) e.textContent = text;
  return e;
}
function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

function bucketRes(w, h) {
  if (!w || !h) return null;
  if (w >= 7000) return '8K+';
  if (w >= 4800) return '5K';
  if (w >= 3500) return '4K';
  if (w >= 2500) return '1440p';
  if (w >= 1900) return '1080p';
  if (w >= 1200) return '720p';
  return '<=720p';
}

const MEDIA_BASE = (window.WALLPAPERS_BASE_URL || '').replace(/\/+$/, '');
function mediaUrl(p) {
  if (!p) return p;
  if (/^(https?:|data:|blob:)/i.test(p)) return p;
  return MEDIA_BASE ? `${MEDIA_BASE}/${p.replace(/^\/+/, '')}` : p;
}

async function load() {
  let data;
  if (window.WALLPAPERS) {
    data = window.WALLPAPERS;
  } else {
    const res = await fetch('wallpapers.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    data = await res.json();
  }
  for (const [, m] of Object.entries(data)) {
    m._resTier = bucketRes(m.width, m.height);
  }
  STATE.entries = Object.entries(data);
  STATE.byPath = data;
  $('#count').textContent = STATE.entries.length.toLocaleString() + ' wallpapers';

  readUrl();
  $('#q').value = STATE.filters.q || '';
  buildFilters();
  applyFilters({ writeUrl: false });

  const hashPath = decodeHashPath();
  if (hashPath && STATE.byPath[hashPath]) {
    openLightbox(hashPath, STATE.byPath[hashPath], { push: false });
  }
}

function inc(m, k) { if (!k) return; m.set(k, (m.get(k) || 0) + 1); }
function sortedKeys(m) { return [...m.entries()].sort((a,b) => b[1] - a[1]).map(([k]) => k); }

function buildFilters() {
  const tones = new Map(), colors = new Map(), resolutions = new Map();
  for (const [, m] of STATE.entries) {
    inc(tones, m.tone);
    inc(colors, m.color);
    inc(resolutions, m._resTier);
  }

  filtersEl.replaceChildren();
  const toneItems  = ['dark','light'].filter(t => tones.has(t)).map(t => ['tone', t, tones.get(t)]);
  const colorList  = COLOR_ORDER.filter(c => colors.has(c));
  const resItems   = RES_TIERS.filter(t => resolutions.has(t));

  const row = el('div', 'frow');
  row.appendChild(el('div', 'flabel', 'filter'));
  toneItems.forEach(([k, v, c]) => row.appendChild(chipEl(k, v, c)));
  row.appendChild(el('span', 'sep'));
  // Color was 9 inline chips - reads as noise. As a dropdown each
  // item gets a small colored dot adornment so the list stays
  // visually identifiable.
  row.appendChild(dropdownEl('color', colors, colorList, 'color', (name) => {
    const dot = el('span', 'chip-dot-inline');
    dot.style.background = COLOR_DOTS[name] || '#999';
    return dot;
  }));
  row.appendChild(el('span', 'sep'));
  // One dropdown that controls both the lower and upper resolution
  // bound. Each row inside has a name, the live count, and two
  // operator buttons (>= and <=) so you can pin either end of the
  // range without leaving the list.
  row.appendChild(rangeDropdownEl('res_min', 'res_max', resItems, 'res'));
  filtersEl.appendChild(row);
}

function facetField(m, key) {
  if (key === 'res_min' || key === 'res_max') return m._resTier;
  return m[key];
}

// True if entry m passes the filter for `key` given value `v`. Handles
// the range semantics for res_min / res_max (open-ended bounds).
function passesFilterKey(m, key, v) {
  if (!v) return true;
  if (key === 'res_min' || key === 'res_max') {
    const entIdx = RES_TIERS.indexOf(m._resTier);
    const filtIdx = RES_TIERS.indexOf(v);
    if (entIdx < 0 || filtIdx < 0) return false;
    return key === 'res_min' ? entIdx >= filtIdx : entIdx <= filtIdx;
  }
  return facetField(m, key) === v;
}

function computeFacetCounts() {
  const f = STATE.filters;
  const q = f.q.trim().toLowerCase();
  const out = { tone: {}, color: {}, res_min: {}, res_max: {} };
  for (const [path, m] of STATE.entries) {
    if (q) {
      const hay = (path + ' ' + (m.title||'') + ' ' + (m.tags||[]).join(' ')).toLowerCase();
      if (!hay.includes(q)) continue;
    }
    for (const k of FILTER_KEYS) {
      // The count under k is "how many entries match if I set k to its
      // value(s)" - so all OTHER filters must pass. Range filters
      // (res_min/res_max) participate the same way.
      let match = true;
      for (const k2 of FILTER_KEYS) {
        if (k2 === k) continue;
        if (!passesFilterKey(m, k2, f[k2])) { match = false; break; }
      }
      if (!match) continue;
      const v = facetField(m, k);
      if (!v) continue;
      if (k === 'res_min') {
        // Counts the entry under every tier <= entry's tier (would
        // still pass a "min >= tier" filter).
        const entIdx = RES_TIERS.indexOf(v);
        for (let i = 0; i <= entIdx; i++) {
          out[k][RES_TIERS[i]] = (out[k][RES_TIERS[i]] || 0) + 1;
        }
      } else if (k === 'res_max') {
        const entIdx = RES_TIERS.indexOf(v);
        for (let i = entIdx; i < RES_TIERS.length; i++) {
          out[k][RES_TIERS[i]] = (out[k][RES_TIERS[i]] || 0) + 1;
        }
      } else {
        out[k][v] = (out[k][v] || 0) + 1;
      }
    }
  }
  return out;
}

function updateFacetUI() {
  for (const chip of filtersEl.querySelectorAll('.chip')) {
    const k = chip.dataset.filter, v = chip.dataset.value;
    const c = (STATE.facetCounts[k] || {})[v] || 0;
    const num = chip.querySelector('.num');
    if (num) num.textContent = String(c);
    chip.classList.toggle('zero', c === 0);
  }
}

function chipEl(filterKey, value, count) {
  const chip = el('div', 'chip');
  chip.dataset.filter = filterKey;
  chip.dataset.value = value;
  if (filterKey === 'color') {
    const dot = el('span', 'dot');
    dot.style.background = COLOR_DOTS[value] || '#999';
    chip.appendChild(dot);
  } else if (filterKey === 'tone') {
    const dot = el('span', 'dot');
    dot.style.background = TONE_DOTS[value] || '#999';
    chip.appendChild(dot);
  }
  chip.appendChild(el('span', null, value));
  chip.appendChild(el('span', 'num', String(count)));
  chip.addEventListener('click', () => toggleFilter(filterKey, value));
  if (STATE.filters[filterKey] === value) chip.classList.add('active');
  return chip;
}

function dropdownEl(filterKey, counts, orderedItems, displayLabel, adornFn) {
  const items = orderedItems || sortedKeys(counts);
  const wrap = el('div', 'dd');
  const btn = el('button', 'dd-btn');
  btn.type = 'button';
  const lab = el('span', 'dd-label', displayLabel || filterKey);
  const val = el('span', 'dd-val', 'all');
  const clr = el('span', 'dd-clear', '×');
  clr.title = 'clear';
  const caret = el('span', 'dd-caret', '▾');
  btn.append(lab, val, clr, caret);

  const menu = el('div', 'dd-menu');
  const search = document.createElement('input');
  search.type = 'search';
  search.className = 'dd-search';
  search.placeholder = `Search ${filterKey}...`;
  const list = el('div', 'dd-list');
  menu.append(search, list);

  function refresh(query = '') {
    list.replaceChildren();
    const q = query.trim().toLowerCase();
    const live = STATE.facetCounts[filterKey] || {};
    const filtered = items.filter(k => !q || k.toLowerCase().includes(q));
    for (const k of filtered) {
      const c = live[k] || 0;
      const item = el('div', 'dd-item');
      if (STATE.filters[filterKey] === k) item.classList.add('selected');
      if (c === 0) item.classList.add('zero');
      // adornFn lets a caller add a left-side icon (e.g. a colored
      // dot for the color filter) so items stay visually identifiable.
      // Wrap dot + text in a single flex group so space-between
      // doesn't blow them apart.
      const left = el('span');
      left.style.display = 'flex'; left.style.alignItems = 'center'; left.style.gap = '8px';
      if (adornFn) {
        const adorn = adornFn(k);
        if (adorn) left.appendChild(adorn);
      }
      left.appendChild(el('span', null, k));
      item.appendChild(left);
      item.appendChild(el('span', 'dd-item-count', String(c)));
      item.addEventListener('click', () => {
        STATE.filters[filterKey] = k;
        close(); paintBtn(); applyFilters();
      });
      list.appendChild(item);
    }
  }
  function paintBtn() {
    const current = STATE.filters[filterKey];
    if (current) { btn.classList.add('active'); val.textContent = current; }
    else { btn.classList.remove('active'); val.textContent = 'all'; }
  }
  function open() {
    document.querySelectorAll('.dd-menu.open').forEach(m => m !== menu && m.classList.remove('open'));
    menu.classList.add('open');
    refresh(search.value);
    setTimeout(() => search.focus(), 0);
  }
  function close() { menu.classList.remove('open'); }

  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (e.target === clr || clr.contains(e.target)) {
      STATE.filters[filterKey] = null;
      paintBtn(); applyFilters();
      return;
    }
    menu.classList.contains('open') ? close() : open();
  });
  menu.addEventListener('click', (e) => e.stopPropagation());
  search.addEventListener('input', () => refresh(search.value));
  search.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') close();
    if (e.key === 'Enter') { const first = list.querySelector('.dd-item'); if (first) first.click(); }
  });

  wrap.append(btn, menu);
  paintBtn();
  return wrap;
}

function rangeDropdownEl(minKey, maxKey, items, displayLabel) {
  const wrap = el('div', 'dd');

  const btn = el('button', 'dd-btn');
  btn.type = 'button';
  const lab = el('span', 'dd-label', displayLabel);
  const val = el('span', 'dd-val', 'all');
  const clr = el('span', 'dd-clear', '×');
  clr.title = 'clear';
  const caret = el('span', 'dd-caret', '▾');
  btn.append(lab, val, clr, caret);

  const menu = el('div', 'dd-menu');
  const list = el('div', 'dd-list');
  menu.append(list);

  function refresh() {
    list.replaceChildren();
    const liveMin = STATE.facetCounts[minKey] || {};
    const liveMax = STATE.facetCounts[maxKey] || {};
    for (const k of items) {
      const row = el('div', 'dd-range');
      row.appendChild(el('span', 'name', k));
      // Count shown: how many wallpapers would match if you applied
      // the currently-relevant bound to this tier. We bias toward the
      // bound the user is more likely to be tweaking next, but really
      // either is fine - we display the lower of the two so the count
      // doesn't look misleadingly high.
      const cMin = liveMin[k] || 0;
      const cMax = liveMax[k] || 0;
      const count = Math.min(cMin || cMax, cMax || cMin);
      row.appendChild(el('span', 'count', String(count)));
      if (!count) row.classList.add('zero');

      const minBtn = el('button', 'op-btn');
      minBtn.type = 'button';
      minBtn.textContent = '>=';
      minBtn.title = `at least ${k}`;
      if (STATE.filters[minKey] === k) minBtn.classList.add('active');
      minBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        STATE.filters[minKey] = STATE.filters[minKey] === k ? null : k;
        paintBtn(); applyFilters(); refresh();
      });
      row.appendChild(minBtn);

      const maxBtn = el('button', 'op-btn');
      maxBtn.type = 'button';
      maxBtn.textContent = '<=';
      maxBtn.title = `at most ${k}`;
      if (STATE.filters[maxKey] === k) maxBtn.classList.add('active');
      maxBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        STATE.filters[maxKey] = STATE.filters[maxKey] === k ? null : k;
        paintBtn(); applyFilters(); refresh();
      });
      row.appendChild(maxBtn);

      list.appendChild(row);
    }
  }

  function paintBtn() {
    const mn = STATE.filters[minKey];
    const mx = STATE.filters[maxKey];
    if (!mn && !mx) {
      btn.classList.remove('active');
      val.textContent = 'all';
    } else {
      btn.classList.add('active');
      if (mn && mx)      val.textContent = `${mn} .. ${mx}`;
      else if (mn)        val.textContent = `>= ${mn}`;
      else                val.textContent = `<= ${mx}`;
    }
  }

  function open() {
    document.querySelectorAll('.dd-menu.open').forEach(m => m !== menu && m.classList.remove('open'));
    menu.classList.add('open');
    refresh();
  }
  function close() { menu.classList.remove('open'); }

  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (e.target === clr || clr.contains(e.target)) {
      STATE.filters[minKey] = null;
      STATE.filters[maxKey] = null;
      paintBtn(); applyFilters();
      return;
    }
    menu.classList.contains('open') ? close() : open();
  });
  menu.addEventListener('click', (e) => e.stopPropagation());

  wrap.append(btn, menu);
  paintBtn();
  return wrap;
}

document.addEventListener('pointerdown', (e) => {
  if (!e.target.closest('.dd')) {
    document.querySelectorAll('.dd-menu.open').forEach(m => m.classList.remove('open'));
  }
});

function toggleFilter(key, val) {
  STATE.filters[key] = STATE.filters[key] === val ? null : val;
  syncChipState(); applyFilters();
}
function syncChipState() {
  for (const chip of filtersEl.querySelectorAll('.chip')) {
    const k = chip.dataset.filter, v = chip.dataset.value;
    chip.classList.toggle('active', STATE.filters[k] === v);
  }
}

function applyFilters(opts = {}) {
  const f = STATE.filters;
  const q = f.q.trim().toLowerCase();
  STATE.filtered = STATE.entries.filter(([path, m]) => {
    for (const k of FILTER_KEYS) {
      if (!passesFilterKey(m, k, f[k])) return false;
    }
    if (q) {
      const hay = (path + ' ' + (m.title||'') + ' ' + (m.tags||[]).join(' ')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  $('#count').textContent = `${STATE.filtered.length.toLocaleString()} / ${STATE.entries.length.toLocaleString()}`;
  STATE.rendered = 0;
  grid.replaceChildren();
  renderMore();
  STATE.facetCounts = computeFacetCounts();
  updateFacetUI();
  if (opts.writeUrl !== false) writeUrl();
  // Keep the snapshot the popstate handler diffs against in sync with
  // whatever filters we just applied.
  lastFiltersSnap = filtersSnapshot();
}

const io = new IntersectionObserver((entries) => {
  for (const e of entries) {
    if (e.isIntersecting && e.target.dataset.src) {
      const img = e.target;
      img.src = img.dataset.src;
      img.removeAttribute('data-src');
      io.unobserve(img);
    }
  }
}, { rootMargin: '300px' });

const sentinelIo = new IntersectionObserver((entries) => {
  if (entries[0].isIntersecting) renderMore();
}, { rootMargin: '600px' });

function renderMore() {
  if (STATE.rendered === 0 && STATE.filtered.length === 0) {
    grid.appendChild(el('div', 'empty', 'No matches. Try clearing a filter.'));
    return;
  }
  const oldSentinel = grid.querySelector('.sentinel');
  if (oldSentinel) oldSentinel.remove();

  const end = Math.min(STATE.filtered.length, STATE.rendered + STATE.pageSize);
  const frag = document.createDocumentFragment();
  for (let i = STATE.rendered; i < end; i++) {
    frag.appendChild(cardEl(STATE.filtered[i]));
  }
  STATE.rendered = end;

  if (end < STATE.filtered.length) {
    const sentinel = el('div', 'sentinel');
    frag.appendChild(sentinel);
    grid.appendChild(frag);
    sentinelIo.disconnect();
    sentinelIo.observe(sentinel);
  } else {
    grid.appendChild(frag);
  }
}

function cardEl([path, m]) {
  const card = el('div', 'card');
  card.title = m.title || path;

  const imgWrap = el('div', 'card-image');
  const img = document.createElement('img');
  img.alt = m.title || path;
  img.loading = 'lazy';
  img.dataset.src = mediaUrl(m.thumb_path);
  img.addEventListener('load', () => img.classList.add('loaded'));
  io.observe(img);
  imgWrap.appendChild(img);
  imgWrap.appendChild(el('div', 'badge', `${m.tone || ''} ${m.color || ''}`.trim()));
  card.appendChild(imgWrap);

  // Card body is intentionally minimal on the overview: just title
  // and a tiny variant count. The 16-color swatch strips moved to the
  // lightbox only - they were too noisy at gallery scale.
  const body = el('div', 'card-body');
  body.appendChild(el('div', 'card-title', m.title || path.split('/').pop()));
  const variantCount = Object.keys(m.themes || {}).length;
  body.appendChild(el('div', 'card-sub', `${variantCount} variants`));

  card.appendChild(body);
  card.addEventListener('click', () => openLightbox(path, m));
  return card;
}

const lb = $('#lb');
const lbSide = $('#lbside');

function openLightbox(path, m, opts = {}) {
  const wrap = document.querySelector('.lb-image-wrap');
  wrap.replaceChildren();
  const img = document.createElement('img');
  img.src = mediaUrl(m.medium_path || path);
  img.alt = m.title || path;
  wrap.appendChild(img);
  renderSide(path, m);
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';

  if (opts.push !== false) {
    const newUrl = buildUrl({ withHash: false }) + '#' + encodePath(path);
    history.pushState({ lightbox: path }, '', newUrl);
  }
}

function copyText(text, target) {
  if (navigator.clipboard) navigator.clipboard.writeText(text).catch(() => {});
  if (target) {
    const orig = target.textContent;
    target.textContent = 'copied';
    setTimeout(() => target.textContent = orig, 900);
  }
}

const ROLE_PREVIEW = [
  ['background', 'bg'],
  ['foreground', 'fg'],
  ['accent', 'accent'],
];

function variantPanel(path, wallpaperEntry, scheme, theme) {
  const label = VARIANT_LABEL[scheme] || scheme;
  const slug = theme.name || '';

  const panel = el('div', 'variant');

  // Header row: variant name on the left, Apply button on the right.
  // Putting Apply in the header (rather than below the ramp) makes the
  // whole panel ~3 rows tall instead of ~5, fitting all four variants
  // comfortably in the sidebar without scrolling.
  const head = el('div', 'variant-head');
  head.appendChild(el('div', 'variant-name', label));

  // Apply: one-click install + activate via aether://.
  // silent=true skips Aether's confirmation dialog. Safe here because the
  // user explicitly clicked Apply inside our own gallery. Don't carry
  // silent=true onto links posted into third-party contexts -- any web
  // page can produce a silent-apply link.
  // as_omarchy_theme=<slug> tells Aether the install dir name to use
  // under ~/.config/omarchy/themes/<slug>/.
  if (theme.colors_toml) {
    const params = new URLSearchParams();
    params.set('colors', mediaUrl(theme.colors_toml));
    // Wallpaper URL: use the original full-res file already on Hetzner
    // (under dark/*, light/*) rather than the per-theme symlinked path,
    // which we excluded from the omarchy-themes sync to avoid duplicate
    // uploads. The path is the manifest entry's own key.
    params.set('wallpaper', mediaUrl(path));
    params.set('silent', 'true');
    params.set('as_omarchy_theme', slug);
    const apply = el('a', 'variant-apply', 'Apply');
    apply.href = `aether://apply?${params.toString()}`;
    apply.title = `Apply ${label} with Aether (installs as ${slug})`;
    head.appendChild(apply);
  }
  panel.appendChild(head);

  // 16-color ANSI strip, click any swatch to copy its hex.
  if (theme.colors) {
    const ramp = el('div', 'ramp');
    for (const k of ANSI_KEYS) {
      const sl = el('div', 'sl');
      sl.style.background = theme.colors[k] || 'transparent';
      sl.title = `${k}: ${theme.colors[k] || ''}`;
      sl.style.cursor = 'pointer';
      sl.addEventListener('click', (e) => { e.stopPropagation(); copyText(theme.colors[k] || ''); });
      ramp.appendChild(sl);
    }
    panel.appendChild(ramp);
  }

  // Footer: just the theme slug as a hint of what gets installed.
  // Direct colors.toml / neovim.lua links removed - the Apply button
  // handles installation, and power users can find the raw files at
  // the URLs encoded in the aether:// link.
  const foot = el('div', 'variant-foot');
  foot.appendChild(el('span', 'slug', slug));
  panel.appendChild(foot);

  return panel;
}

function renderSide(path, m) {
  lbSide.replaceChildren();

  lbSide.appendChild(el('div', 'lb-title', m.title || path.split('/').pop()));
  lbSide.appendChild(el('div', 'lb-path', path));

  const kv = el('dl', 'kv');
  const rows = [
    ['res',    m.dimensions],
    ['tone',   m.tone],
    ['color',  m.color],
  ];
  for (const [k, v] of rows) {
    if (!v) continue;
    kv.appendChild(el('dt', null, k));
    kv.appendChild(el('dd', null, v));
  }
  lbSide.appendChild(kv);

  if (m.tags && m.tags.length) {
    const wrap = el('div', 'tags');
    m.tags.forEach(t => wrap.appendChild(el('span', 'tag', t)));
    lbSide.appendChild(wrap);
  }

  // Variants section -- one panel per packaged variant. Iterating in
  // VARIANT_ORDER (not Object.keys order) keeps Deep > Warm > Cool >
  // Material stable. Wrapped in a tight-gap container so the four
  // panels stack without much air between them.
  if (m.themes) {
    lbSide.appendChild(el('div', 'lb-sec-label', 'apply'));
    const vlist = el('div', 'lb-variants');
    for (const scheme of VARIANT_ORDER) {
      const theme = m.themes[scheme];
      if (!theme) continue;
      vlist.appendChild(variantPanel(path, m, scheme, theme));
    }
    lbSide.appendChild(vlist);
  }

}

function closeLightbox(opts = {}) {
  if (!lb.classList.contains('open')) return;
  lb.classList.remove('open');
  document.querySelector('.lb-image-wrap').replaceChildren();
  document.body.style.overflow = '';

  if (opts.pop !== false && history.state && history.state.lightbox) {
    history.back();
  } else if (opts.pop !== false && location.hash) {
    history.replaceState(null, '', buildUrl({ withHash: false }));
  }
}
$('#lbclose').addEventListener('click', () => closeLightbox());
lb.addEventListener('click', (e) => { if (e.target === lb || e.target.classList.contains('lb-image-wrap')) closeLightbox(); });

// Lightbox navigation: arrows (vertical + horizontal), vim keys h/j/k/l,
// and Tab (Shift+Tab back). Moves to the adjacent wallpaper in the
// currently-filtered list and wraps around at the ends.
function navLightbox(delta) {
  if (!lb.classList.contains('open')) return;
  const hashPath = decodeHashPath();
  if (!hashPath) return;
  const list = STATE.filtered;
  if (!list.length) return;
  const idx = list.findIndex(([p]) => p === hashPath);
  if (idx < 0) return;
  const nextIdx = (idx + delta + list.length) % list.length;
  const [nextPath, nextEntry] = list[nextIdx];
  openLightbox(nextPath, nextEntry, { push: false });
  history.replaceState({ lightbox: nextPath }, '',
    buildUrl({ withHash: false }) + '#' + encodePath(nextPath));
}

document.addEventListener('keydown', (e) => {
  if (!lb.classList.contains('open')) return;
  // Don't hijack keys while the user is typing into an input field.
  if (e.target && e.target.tagName && /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;
  if (e.key === 'Escape') return closeLightbox();
  const prev = (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'h' || e.key === 'k'
                || (e.key === 'Tab' && e.shiftKey));
  const next = (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'l' || e.key === 'j'
                || (e.key === 'Tab' && !e.shiftKey));
  if (prev) { e.preventDefault(); navLightbox(-1); }
  else if (next) { e.preventDefault(); navLightbox(+1); }
});

// Apply button click acknowledgement. The aether:// URL still fires
// (we don't preventDefault) -- we just give the user immediate visual
// confirmation that the click registered, since the browser provides
// no feedback about whether the protocol handler accepted the URL.
const TOAST = $('#toast');
const TOAST_TITLE = $('#toast-title');
const TOAST_DETAIL = $('#toast-detail');
const TOAST_DOT = $('#toast-dot');
let toastTimer = null;
function showToast(title, detail, ok = false) {
  TOAST_TITLE.textContent = title;
  TOAST_DETAIL.textContent = detail || '';
  TOAST_DOT.classList.toggle('ok', ok);
  TOAST.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => TOAST.classList.remove('show'), 2800);
}

function setApplyContent(btn, label, spinning) {
  btn.replaceChildren();
  if (spinning) {
    const spin = document.createElement('span');
    spin.className = 'spin';
    btn.appendChild(spin);
  }
  btn.appendChild(document.createTextNode(label));
}

document.addEventListener('click', (e) => {
  const btn = e.target.closest('.variant-apply');
  if (!btn) return;
  // Don't block the browser from opening aether://. We only update the UI.
  const originalText = btn.dataset.originalText || (btn.textContent || 'Apply');
  btn.dataset.originalText = originalText;
  const slugMatch = btn.title && btn.title.match(/installs as (\S+)/);
  const slugStr = slugMatch ? slugMatch[1] : '';

  btn.classList.add('applying');
  btn.classList.remove('sent');
  setApplyContent(btn, 'Applying', true);

  showToast('Applying theme...', slugStr ? `via aether:// (${slugStr})` : 'via aether://');

  setTimeout(() => {
    btn.classList.remove('applying');
    btn.classList.add('sent');
    setApplyContent(btn, 'Sent ✓', false);
    showToast('Theme sent to Aether', slugStr, true);
  }, 1400);

  setTimeout(() => {
    btn.classList.remove('sent');
    setApplyContent(btn, originalText, false);
  }, 3200);
});

// Snapshot the filter object so popstate can tell whether the navigation
// actually changed which wallpapers are being shown, or only flipped
// lightbox state (hash). Closing the lightbox should NOT rebuild the
// grid - that wipes infinite-scroll progress and scroll position.
function filtersSnapshot() {
  return JSON.stringify(STATE.filters);
}
let lastFiltersSnap = '';

window.addEventListener('popstate', () => {
  const prev = lastFiltersSnap;
  readUrl();
  const curr = filtersSnapshot();
  lastFiltersSnap = curr;

  if (curr !== prev) {
    // Filters changed (browser back / forward across a real filter change).
    // Re-render the gallery; otherwise leave it untouched.
    $('#q').value = STATE.filters.q || '';
    buildFilters();
    applyFilters({ writeUrl: false });
  }

  const hashPath = decodeHashPath();
  const isOpen = lb.classList.contains('open');
  if (hashPath && STATE.byPath[hashPath]) {
    if (!isOpen) openLightbox(hashPath, STATE.byPath[hashPath], { push: false });
  } else if (isOpen) {
    closeLightbox({ pop: false });
  }
});

$('#q').addEventListener('input', debounce((e) => {
  STATE.filters.q = e.target.value;
  applyFilters();
}, 120));

$('#reset').addEventListener('click', () => {
  STATE.filters = { tone: null, color: null, res_min: null, res_max: null, q: '' };
  $('#q').value = '';
  buildFilters();
  applyFilters();
});

function showLoadError(err) {
  grid.replaceChildren();
  const wrap = el('div', 'empty');
  wrap.appendChild(el('div', null, 'Could not load wallpapers.json.'));
  wrap.appendChild(el('div', null, 'Error: ' + (err && err.message || String(err))));
  grid.appendChild(wrap);
}
function hideLoader() {
  const loader = document.getElementById('loading');
  if (loader) loader.classList.add('hidden');
}

load().then(hideLoader).catch(err => { hideLoader(); showLoadError(err); });

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW register failed:', err));
  });
}
</script>
</body></html>
